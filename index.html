<!DOCTYPE html>
<html>
    <head>
        <title>WorldHacks &middot; 2026 &middot; SF</title>
        <style>
            html {
                margin: 0px;
                padding: 0px;
                box-sizing: border-box;
                width: 100vw;
                font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
                height: 100vh;
            }
            body {
                text-align: center;
                padding: 0px;
                margin: 0px;
                height: 100%;
            }
            h1 {
                font-size: 24px;
            }
            h2 { 
                font-size: 14px;
            }
            main {
                height: 100%;
                display: flex;
                flex-direction: column;
                justify-content: center;
                align-items: center;
            }
            #interest-btn {
                margin-top: 28px;
                background: none;
                border: none;
                cursor: pointer;
                font-family: inherit;
                font-size: 13px;
                color: #555;
                text-decoration: underline;
                text-underline-offset: 3px;
                padding: 0;
                transition: color 0.15s;
            }
            #interest-btn:hover { color: #000; }
            #interest-btn:disabled { cursor: default; color: #888; text-decoration: none; }
            #interest-count {
                margin-top: 8px;
                font-size: 12px;
                color: #999;
                min-height: 16px;
            }
        </style>
    </head>
    <body>
        <main>
            <h1>WORLDHACKS 2026</h1>
            <h2>August 22-23</h2>
            <h2>North America &middot; South America &middot; Europe &middot; Asia &middot; Oceania</h2>
            <button id="interest-btn" onclick="expressInterest()">express interest</button>
            <p id="interest-count"></p>
        </main>

        <script type="module">
            const SUPABASE_URL = 'https://amdxgbjdkhbuhxoneazk.supabase.co';
            const SUPABASE_ANON_KEY = 'sb_publishable_hA9d8FroCca9mRYvrqg-EA_2Fe8cW2J';

            async function fetchCount() {
                const res = await fetch(`${SUPABASE_URL}/rest/v1/interests?select=id`, {
                    headers: { apikey: SUPABASE_ANON_KEY, Authorization: `Bearer ${SUPABASE_ANON_KEY}`, Prefer: 'count=exact' }
                });
                const count = res.headers.get('content-range')?.split('/')[1];
                return count ? parseInt(count) : 0;
            }

            async function addInterest() {
                await fetch(`${SUPABASE_URL}/rest/v1/interests`, {
                    method: 'POST',
                    headers: { apikey: SUPABASE_ANON_KEY, Authorization: `Bearer ${SUPABASE_ANON_KEY}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({})
                });
            }

            
            window.expressInterest = async function() {
                const btn = document.getElementById('interest-btn');
                const countEl = document.getElementById('interest-count');
                btn.disabled = true;
                await addInterest();
                const n = await fetchCount();
                btn.textContent = 'interest expressed ✓';
                countEl.textContent = `${n} ${n === 1 ? 'person' : 'people'} interested`;
                localStorage.setItem('wh_interested', '1');
            };

            (async () => {
                const countEl = document.getElementById('interest-count');
                const btn = document.getElementById('interest-btn');
                try {
                    const n = await fetchCount();
                    if (n > 0) countEl.textContent = `${n} ${n === 1 ? 'person' : 'people'} interested`;
                    if (localStorage.getItem('wh_interested')) {
                        btn.textContent = 'interested';
                        btn.disabled = true;
                    }
                } catch (e) { /* silently fail if Supabase not configured */ }
            })();
        </script>
    </body>
</html>
